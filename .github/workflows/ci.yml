name: CI

on:
    push:
        branches: [ "main" ]
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Setup .NET
          uses: actions/setup-dotnet@v3
          with:
            dotnet-version: 9.0

        - name: Restore
          run: dotnet restore

        - name: Build
          run: dotnet build

        - name: Test
          run: dotnet test

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: app
            path: publish